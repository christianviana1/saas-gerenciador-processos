<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Você está offline — LegalSaaS</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
        background-color: #f8fafc;
        color: #1e293b;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
      }

      .container {
        max-width: 420px;
        width: 100%;
        text-align: center;
        background: #ffffff;
        border-radius: 12px;
        padding: 2.5rem 2rem;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }

      .icon {
        font-size: 4rem;
        margin-bottom: 1.25rem;
        display: block;
        line-height: 1;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        color: #1e293b;
      }

      p {
        font-size: 0.9375rem;
        color: #64748b;
        line-height: 1.6;
        margin-bottom: 1.75rem;
      }

      .btn-retry {
        display: inline-block;
        background-color: #1e3a5f;
        color: #ffffff;
        font-size: 0.9375rem;
        font-weight: 600;
        padding: 0.65rem 1.75rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.2s ease;
        text-decoration: none;
      }

      .btn-retry:hover,
      .btn-retry:focus-visible {
        background-color: #16324f;
        outline: 2px solid #1e3a5f;
        outline-offset: 2px;
      }

      .footer-note {
        margin-top: 1.5rem;
        font-size: 0.8125rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="container" role="main">
      <span class="icon" aria-hidden="true">📡</span>
      <h1>Você está offline</h1>
      <p>
        Sem conexão com a internet no momento. Verifique sua rede e tente novamente.
        Os dados exibidos podem ser de uma versão anterior armazenada no dispositivo.
      </p>
      <button
        class="btn-retry"
        type="button"
        onclick="location.reload()"
        aria-label="Tentar novamente"
      >
        Tentar novamente
      </button>
      <p class="footer-note">LegalSaaS — Gestão Jurídica</p>
    </div>
  </body>
</html>
